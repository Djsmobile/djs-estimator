<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DJ's Estimate Builder</title>

<style>
:root{
--bg:#0b0b0b; --card:#141414; --card2:#101010; --text:#f2f2f2;
--muted:rgba(242,242,242,.72); --border:rgba(255,255,255,.10);
--accent:#d4af37;
}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial}
.wrap{max-width:1100px;margin:auto;padding:12px}
.card{background:var(--card);padding:12px;border-radius:14px;margin-bottom:12px;border:1px solid var(--border)}
input,textarea,select{width:100%;padding:8px;border-radius:10px;background:var(--card2);color:#fff;border:1px solid var(--border)}
button{padding:8px 12px;border-radius:10px;border:none;font-weight:bold;cursor:pointer}
.primary{background:var(--accent);color:#000}
.secondary{background:#222;color:#fff}
.job{background:#111;padding:10px;border-radius:12px;margin-bottom:10px;border:1px solid var(--border)}
.job-header{display:flex;justify-content:space-between;align-items:center}
.job-title{font-weight:bold}
.toggle{cursor:pointer;font-size:12px;color:#aaa}
.hidden{display:none}
.small{font-size:12px;color:#aaa}
.row{display:flex;gap:6px}
.row input{flex:1}
.parts{margin-top:10px}
.part{margin-bottom:8px;padding:8px;border:1px solid #333;border-radius:8px}
</style>
</head>

<body>
<div class="wrap">

<form method="POST" action="/save_quote" enctype="multipart/form-data">

<div class="card">
<h3>Customer</h3>
<input name="customer_name" placeholder="Name">
<input name="vehicle" placeholder="Vehicle">
</div>

<div id="services"></div>

<div class="card">
<button type="button" onclick="addJob()" class="secondary">+ Add Service</button>
</div>

<div class="card">
<h3>Inspection</h3>
<div id="inspection"></div>
<button type="button" onclick="addInspection()" class="secondary">+ Add Item</button>
</div>

<div class="card">
<button type="submit" class="primary">Save Quote</button>
</div>

</form>
</div>

<script>
function addJob(){
const container=document.getElementById('services')

const div=document.createElement('div')
div.className='job'

div.innerHTML=`
<div class="job-header">
<div>
<input name="job_desc[]" placeholder="Service">
<input name="job_labor_hrs[]" placeholder="Hrs">
</div>
<div>
<div class="toggle" onclick="toggle(this)">▼ Expand</div>
<button type="button" onclick="this.closest('.job').remove()">X</button>
</div>
</div>

<div class="job-body hidden">

<textarea name="job_notes[]" placeholder="Notes"></textarea>

<button type="button" onclick="addPart(this)">+ Part</button>
<div class="parts"></div>

</div>
`

container.appendChild(div)
}

function toggle(el){
const body=el.closest('.job').querySelector('.job-body')
body.classList.toggle('hidden')
}

function addPart(btn){
const wrap=btn.nextElementSibling

const div=document.createElement('div')
div.className='part'

div.innerHTML=`
<input name="part_desc_0[]" placeholder="Part">
<input name="part_qty_0[]" value="1">
<input name="part_quality_0[]" placeholder="Price">
`

wrap.appendChild(div)
}

function addInspection(){
const wrap=document.getElementById('inspection')

const div=document.createElement('div')

div.innerHTML=`
<input name="inspection_label[]" placeholder="Item">
<textarea name="inspection_notes[]" placeholder="Notes"></textarea>
<input type="file" name="inspection_photo[]" accept="image/*">
`

wrap.appendChild(div)
}
</script>

</body>
</html>
