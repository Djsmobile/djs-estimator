<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin - DJ's Mobile Mechanic</title>

<style>
:root{
  --bg:#090a0d;
  --panel:#141922;
  --panel2:#10141b;
  --text:#f3f4f6;
  --muted:#a1a1aa;
  --line:#2c2f36;
  --accent:#d4af37;
  --red:#ef4444;
}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:linear-gradient(180deg,#0d1016,#06070a);
  color:var(--text);
}
.wrap{max-width:1100px;margin:0 auto;padding:20px;}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
h1{margin:0;}
.btn{
  border:none;
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
  font-weight:700;
}
.btn-logout{
  background:var(--red);
  color:#fff;
}
.card{
  background:var(--panel);
  padding:16px;
  border-radius:16px;
  margin-bottom:14px;
  border:1px solid var(--line);
}
.small{color:var(--muted);font-size:13px;}
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
a{color:var(--accent);text-decoration:none;font-weight:700;}
.empty{
  text-align:center;
  color:var(--muted);
  margin-top:40px;
}
</style>
</head>

<body>
<div class="wrap">

  <div class="header">
    <h1>Admin Dashboard</h1>
    <a href="/logout">
      <button class="btn btn-logout">Logout</button>
    </a>
  </div>

  {% if requests and requests|length > 0 %}
    {% for req in requests %}
    <div class="card">
      <div class="row">
        <div>
          <div><strong>{{ req.customer_name or 'No Name' }}</strong></div>
          <div class="small">{{ req.vehicle or '' }}</div>
          <div class="small">{{ req.customer_phone or '' }}</div>
          <div class="small">{{ req.requested_service or '' }}</div>
        </div>

        <div>
          <a href="/?request_id={{ req.id }}">Use in estimator</a>
        </div>
      </div>
    </div>
    {% endfor %}
  {% else %}
    <div class="empty">No leads yet</div>
  {% endif %}

</div>
</body>
</html>
