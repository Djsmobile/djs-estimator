<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>DJ's Estimate Review</title>

<style>
/* === KEEP YOUR ORIGINAL STYLES ABOVE === */

/* ===== PRO PDF PRINT STYLES ===== */
@media print{

  body{
    background:#ffffff !important;
    color:#111 !important;
  }

  .card,
  .service-card,
  .parts-box,
  .detail-box,
  .meta div,
  .inspection-item{
    background:#ffffff !important;
    color:#111 !important;
    border:1px solid #d1d5db !important;
    box-shadow:none !important;
  }

  h1{color:#111 !important;}
  h2{
    color:#111 !important;
    border-bottom:2px solid #e5e7eb;
    padding-bottom:6px;
  }

  .kicker,
  .pill,
  .muted{
    color:#555 !important;
  }

  .logo{
    background:transparent !important;
    border:none !important;
  }

  .service-title{color:#111 !important;}
  .service-money{
    color:#000 !important;
    font-size:20px !important;
  }

  .parts-box{
    background:#f9fafb !important;
  }

  .part-row{
    border-bottom:1px solid #e5e7eb !important;
  }

  .selected-summary{
    background:#f3f4f6 !important;
    border:1px solid #e5e7eb !important;
  }

  .selected-summary .value{color:#111 !important;}
  .selected-summary .price{
    color:#000 !important;
    font-size:18px !important;
  }

  .choice-card{
    background:#ffffff !important;
    border:1px solid #d1d5db !important;
    box-shadow:none !important;
  }

  .choice-card.selected{
    border:2px solid #000 !important;
    background:#f9fafb !important;
  }

  .choice-name{color:#111 !important;}
  .choice-price{color:#000 !important;}

  .choice-tag{
    background:#e5e7eb !important;
    color:#333 !important;
  }

  .choice-note,
  .mini{
    color:#666 !important;
  }

  .locked-choice{
    background:#f3f4f6 !important;
    border:1px solid #d1d5db !important;
  }

  .locked-tier{color:#111 !important;}
  .locked-price{color:#000 !important;}

  .summary{
    background:#ffffff !important;
    border:2px solid #000 !important;
  }

  .summary-row{
    border-bottom:1px solid #e5e7eb !important;
  }

  .summary-row.total{
    color:#000 !important;
    font-size:22px !important;
  }

  .actions,
  .no-print,
  .btn,
  .signature-wrap,
  canvas,
  input,
  button{
    display:none !important;
  }

}
</style>
</head>
<body>

<!-- KEEP YOUR ORIGINAL BODY CONTENT EXACTLY THE SAME -->

</body>
</html>
